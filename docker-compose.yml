services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: twentymts
      POSTGRES_PASSWORD: twentymts
      POSTGRES_DB: twentymts
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql

  backend:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  pgdata:
